name: backend-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore HomeScoutCopilot.sln

      - name: Build
        run: dotnet build HomeScoutCopilot.sln --no-restore --configuration Release

      - name: Test (fast, non-integration)
        run: >-
          dotnet test HomeScoutCopilot.sln --no-build --configuration Release
          --filter "Category!=Integration"
